<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC Strategy Session</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body {background: linear-gradient(135deg, #0a2a66, #1e4db7); color:white;}
.container {max-width:500px;margin:auto;padding:20px;}
.card {background:white;color:#222;border-radius:14px;padding:18px;margin-top:18px;}
.btn {margin-top:12px;padding:14px;width:100%;background:linear-gradient(45deg,#ff6b00,#ff9a3c);border:none;color:white;border-radius:10px;cursor:pointer;}
.progress {height:6px;background:#ddd;border-radius:10px;margin-top:8px;}
.progress-bar {height:100%;background:#ff6b00;width:0%;}
.cta-box {background:linear-gradient(135deg,#ff6b00,#ff9a3c);color:white;padding:15px;border-radius:12px;margin-top:12px;text-align:center;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<form id="form">
  <input type="text" id="name" placeholder="Your Name" required><br>
  <select id="attempt" required>
    <option value="">Select Attempt</option>
    <option>2026</option>
    <option>2027</option>
    <option>Beginner</option>
  </select><br>
  <input type="text" id="optional" placeholder="Optional Subject">
  <button class="btn">TAKE QUIZ</button>
</form>
</div>

</div>

<script>

// 🔥 LARGE QUESTION BANK
const questionBank = [
  {q:"Amber Box relates to?", options:["SAARC","WTO","UN"], ans:1},
  {q:"MUDRA Yojana is for?", options:["Farmers","Small business","Students"], ans:1},
  {q:"Repo rate set by?", options:["Govt","RBI","IMF"], ans:1},
  {q:"GDP measures?", options:["Production","Happiness","Population"], ans:0},
  {q:"Article 32?", options:["Remedy","Tax","Election"], ans:0},
  {q:"NITI Aayog replaced?", options:["Planning Commission","Finance Commission","RBI"], ans:0},
  {q:"Fiscal deficit means?", options:["Revenue gap","Borrowing gap","Tax gap"], ans:1},
  {q:"Green Revolution crop?", options:["Rice","Wheat","Cotton"], ans:1},
  {q:"Fundamental Duties added by?", options:["42nd Amendment","44th","52nd"], ans:0},
  {q:"Who appoints CAG?", options:["PM","President","Parliament"], ans:1}
];

let quiz = [];
let time = 120;
let userDistance = "";

// 🎯 Shuffle & pick random 5 questions
function generateQuiz(){
  let shuffled = questionBank.sort(()=>0.5 - Math.random());
  quiz = shuffled.slice(0,5);
}

// 📍 LOCATION DETECTION
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      let userLat = pos.coords.latitude;
      let userLon = pos.coords.longitude;

      let centerLat = 28.710404;
      let centerLon = 77.205877;

      userDistance = getDistance(userLat,userLon,centerLat,centerLon);
    });
  }
}

// 📏 DISTANCE FORMULA (Haversine)
function getDistance(lat1, lon1, lat2, lon2){
  let R = 6371;
  let dLat = (lat2-lat1)*Math.PI/180;
  let dLon = (lon2-lon1)*Math.PI/180;
  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180) *
          Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;

  let c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return (R*c).toFixed(1);
}

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();
  generateQuiz();
  getLocation();
  startQuiz();
});

function startQuiz(){
  document.querySelector(".card").innerHTML = `
    <h3>🧠 UPSC Mini Test</h3>
    <p id="timer">Time: 120s</p>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <form id="quizForm"></form>
    <button class="btn" onclick="submitQuiz()">Submit</button>
  `;

  const form = document.getElementById("quizForm");

  quiz.forEach((item,i)=>{
    let html = `<p><b>Q${i+1}. ${item.q}</b></p>`;
    item.options.forEach((opt,j)=>{
      html += `<label><input type="radio" name="q${i}" value="${j}" onchange="updateProgress()"> ${opt}</label><br>`;
    });
    form.innerHTML += html;
  });

  startTimer();
}

function updateProgress(){
  let answered = document.querySelectorAll('input:checked').length;
  document.getElementById("progressBar").style.width = (answered/quiz.length)*100 + "%";
}

function startTimer(){
  let timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "Time: "+time+"s";
    if(time<=0){
      clearInterval(timer);
      submitQuiz();
    }
  },1000);
}

function submitQuiz(){
  let score = 0;

  quiz.forEach((q,i)=>{
    let ans = document.querySelector(`input[name="q${i}"]:checked`);
    if(ans && parseInt(ans.value) === q.ans) score++;
  });

  document.querySelector(".card").innerHTML = `
    <h3>Your Score: ${score}/${quiz.length}</h3>

    <div class="cta-box">
      📍 You are ${userDistance || "near"} km away<br>
      🎯 Visit Today - Limited Slots<br><br>
      <button class="btn" onclick="openMap()">Get Directions</button>
    </div>

    <div style="margin-top:15px;border-radius:12px;overflow:hidden;">
      <iframe 
        src="https://www.google.com/maps?q=28.710404,77.205877&z=15&output=embed"
        width="100%" height="250" style="border:0;" loading="lazy">
      </iframe>
    </div>
  `;
}

function openMap(){
  window.open("https://www.google.com/maps?q=28.710404,77.205877","_blank");
}

</script>

</body>
</html>
